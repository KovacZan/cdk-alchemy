name: Publish cdk-alchemy-webhooks

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        working-directory: packages/cdk-alchemy-webhooks

      - name: Lint
        run: pnpm lint
        working-directory: packages/cdk-alchemy-webhooks

      - name: Test
        run: pnpm test
        working-directory: packages/cdk-alchemy-webhooks

      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public
        working-directory: packages/cdk-alchemy-webhooks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
